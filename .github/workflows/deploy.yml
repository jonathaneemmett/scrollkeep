name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild and restart container
        run: |
          docker stop scrollkeep || true
          docker rm scrollkeep || true
          docker build -t scrollkeep .
          docker run -d \
            --restart unless-stopped \
            --env-file .env \
            -v ~/.scrollkeep:/home/appuser/.scrollkeep \
            --name scrollkeep \
            scrollkeep
